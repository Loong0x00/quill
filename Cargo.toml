[package]
name = "quill"
version = "0.1.0"
edition = "2021"
authors = ["Loong0x00 <loong.0x00@gmail.com>"]

[dependencies]
alacritty_terminal = "0.26"
anyhow = "1"
calloop = { version = "0.14", features = ["signals"] }
libc = "0.2"
pollster = "0.4"
portable-pty = "0.9"
raw-window-handle = "0.6"
smithay-client-toolkit = "0.19"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
# client_system 切换到 libwayland C 后端 —— wgpu/Vulkan 需要真实 wl_display / wl_surface
# 指针,纯 Rust 后端产出的协议对象不是 ABI 兼容 libwayland。
wayland-backend = { version = "0.3", features = ["client_system"] }
wayland-client = "0.31"
wgpu = "29"

[profile.dev]
opt-level = 1

[profile.release]
lto = true
codegen-units = 1
