<!DOCTYPE html>
<!--
  quill 无头内核 web 镜像 —— xterm.js 本地渲染客户端 (Phase 7 片1, ADR-0015 R1)。

  模型(R1):daemon 转发 PTY **原始字节流**,浏览器 xterm.js 本地模拟 + 本地按
  窗口宽 reflow。不再传网格 Snapshot —— 连上先收环缓冲重放(重建当前屏),之后
  持续收 live 字节(连接保持)。

  线缆体 = WebSocket **二进制帧**(原样 PTY 字节,非 JSON):
    onmessage(ArrayBuffer) → term.write(Uint8Array)
  输入回灌(键盘 → PTY)是下一片(T5),本片只读/只看。

  自包含:xterm.js / css / fit addon 由 daemon 同口 HTTP serve(/vendor/*),
  零 CDN 依赖(手机经 WireGuard VPN 离线可用)。

  用法:浏览器开 http://<主机 LAN/VPN IP>:7878/(手机经 VPN→10.0.0.2:7878)。
-->
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>quill mirror</title>
<link rel="stylesheet" href="/vendor/xterm.css" />
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #000; }
  body { display: flex; flex-direction: column; }
  #bar {
    display: flex; gap: .5rem; align-items: center;
    padding: .25rem .6rem; background: #161616; color: #ccc;
    font-family: system-ui, sans-serif; font-size: .8rem;
    border-bottom: 1px solid #2a2a2a; flex: 0 0 auto;
  }
  #dot { width: .6rem; height: .6rem; border-radius: 50%; background: #844; }
  #dot.live { background: #2a4; }
  #title { font-weight: 600; opacity: .9; }
  #status { margin-left: auto; opacity: .7; }
  /* xterm 容器吃满剩余高度;fit addon 据此算 cols/rows 做本地 reflow */
  #term { flex: 1 1 auto; min-height: 0; padding: .25rem; }
</style>
</head>
<body>
  <div id="bar">
    <span id="dot"></span>
    <span id="title">quill</span>
    <span id="status">连接中…</span>
  </div>
  <div id="term"></div>

<script src="/vendor/xterm.js"></script>
<script src="/vendor/xterm-addon-fit.js"></script>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
const dotEl = $("dot"), titleEl = $("title"), statusEl = $("status");

// 重连退避(ms):断线非事件(R1),后台/锁屏/网络抖动回来自动重连重放。
const RECONNECT_MS = 1000;

const term = new Terminal({
  convertEol: false,          // daemon 转发原始字节,换行语义由字节流自带,别替客户端改
  cursorBlink: true,
  fontFamily: '"DejaVu Sans Mono", "Noto Sans Mono CJK SC", monospace',
  fontSize: 14,
  scrollback: 10000,
  theme: { background: "#000000" },
});
const fit = new FitAddon.FitAddon();
term.loadAddon(fit);
term.open($("term"));
fit.fit();

// 窗口尺寸变化 → 本地 reflow(xterm 据新 cols/rows 重折它已收到的字节缓冲)。
// 本片不把新尺寸回灌 daemon(PTY winsize 仍 80x24,resize 回灌是 T5);xterm
// 本地 reflow 对流式逻辑行(硬 \n)即正确,这是 R1「客户端各自按自己宽 reflow」。
const refit = () => { try { fit.fit(); } catch (_) {} };
window.addEventListener("resize", refit);

function setLive(live, text) {
  dotEl.classList.toggle("live", live);
  statusEl.textContent = text;
}

// 同源:页面由 daemon 同口 serve,WS 直接连同 host:port。file:// 兜底到 10.0.0.2。
function wsUrl() {
  if (location.host) {
    const scheme = location.protocol === "https:" ? "wss:" : "ws:";
    return `${scheme}//${location.host}/`;
  }
  return "ws://10.0.0.2:7878/";
}

let ws = null;
let reconnectTimer = null;

function connect() {
  const url = wsUrl();
  setLive(false, `连接 ${url} …`);
  try {
    ws = new WebSocket(url);
  } catch (e) {
    setLive(false, `URL 非法:${e}`);
    scheduleReconnect();
    return;
  }
  // 关键:收二进制(原始字节)。默认是 'blob' 会异步化乱序,必须 arraybuffer。
  ws.binaryType = "arraybuffer";

  ws.onopen = () => {
    // why: 每次(重)连先 reset,否则 daemon 的重放缓冲会叠加到 xterm 已有内容 →
    // 屏幕重复。断线重连是手机高频路径(后台/锁屏/弱网),不 reset 每次都重复一屏。
    term.reset();
    setLive(true, "已连接(直播)");
  };
  ws.onmessage = (ev) => {
    if (typeof ev.data === "string") return; // 本片不发文本帧;忽略防御
    term.write(new Uint8Array(ev.data));     // xterm 本地模拟 VT + 本地 reflow
  };
  ws.onclose = () => { setLive(false, "连接已断,重连中…"); scheduleReconnect(); };
  ws.onerror = () => { setLive(false, "连接错误(daemon 在跑?VPN 通?)"); };
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    connect();
  }, RECONNECT_MS);
}

// OSC 标题(xterm 解析 \x1b]0;…\x07)→ 顶栏标题。
term.onTitleChange((t) => { titleEl.textContent = t && t.length ? t : "quill"; });

connect();
</script>
</body>
</html>
