<!DOCTYPE html>
<!--
  quill 无头内核 web 镜像 —— xterm.js 本地渲染客户端 (Phase 7 片1 + A′ 响应式, ADR-0015 R1)。

  模型(R1 + A′):daemon 转发 PTY **原始字节流**,浏览器 xterm.js 本地模拟。**忠实视图
  按【桌面宽】渲染**(收 ServerMsg::Dims → term.resize 到桌面 cols/rows,不再 fit 到浏览器)
  —— 桌面把字节流按桌面宽烤死,客户端用同一宽渲染才能与桌面像素对齐、宽度不匹配的折行
  artifact(整宽 `─────` 横线被重折成一摞)消失,且逻辑行可干净还原供响应式重排(增量2)。
  不传网格 Snapshot —— 连上先收环缓冲重放(重建当前屏),之后持续收 live 字节(连接保持)。

  线缆体 = WebSocket **二进制帧**(原样 PTY 字节,非 JSON),双向:
    出站 onmessage(ArrayBuffer) → term.write(Uint8Array)   (PTY → 屏)
    入站 term.onData/onBinary → ws.send(二进制帧)            (键盘 → PTY,片2)

  片2(输入回灌 + 软键栏):xterm.js 已把键盘/方向键/粘贴/IME 编码成 VT 字节串
  (Enter=\r, Ctrl-C=\x03, ↑=\x1b[A …),onData 原样回发即可,daemon 写 active tab
  PTY。底部**软键栏**补手机软键盘没有的键(ESC / ESC ESC 撤回改 / Ctrl-C / Tab /
  Shift-Tab / 方向键 / Ctrl-D),各发对应控制字节。

  自包含:xterm.js / css / fit addon 由 daemon 同口 HTTP serve(/vendor/*),
  零 CDN 依赖(手机经 WireGuard VPN 离线可用)。

  用法:浏览器开 http://<主机 LAN/VPN IP>:7878/(手机经 VPN→10.0.0.2:7878)。
-->
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>quill mirror</title>
<link rel="stylesheet" href="/vendor/xterm.css" />
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #000; }
  body { display: flex; flex-direction: column; }
  #bar {
    display: flex; gap: .5rem; align-items: center;
    padding: .25rem .6rem; background: #161616; color: #ccc;
    font-family: system-ui, sans-serif; font-size: .8rem;
    border-bottom: 1px solid #2a2a2a; flex: 0 0 auto;
  }
  #dot { width: .6rem; height: .6rem; border-radius: 50%; background: #844; }
  #dot.live { background: #2a4; }
  #title { font-weight: 600; opacity: .9; }
  /* A′ 增量2:忠实↔重排切换按钮(顶栏)。margin-left:auto 把它+状态推到右侧。 */
  #modebtn {
    margin-left: auto; flex: 0 0 auto;
    background: #262626; color: #e0e0e0; border: 1px solid #3a3a3a;
    border-radius: .3rem; padding: .15rem .55rem; font: inherit; cursor: pointer;
    user-select: none; -webkit-user-select: none; touch-action: manipulation;
  }
  #modebtn:active { background: #3a3a3a; }
  #status { margin-left: .6rem; opacity: .7; }
  /* A′ toggle-scroll:#stage = 中部唯一 flex 槽(position:relative)。#term 与 #reflow 各自
     absolute inset:0 叠在里头(同尺寸)。#term 永远保持全尺寸,切到重排只是用 #reflow 盖住它
     —— 不再把 #term 缩成 1px(旧 .offscreen 法),xterm 几何不随视图切换被扰动。 */
  #stage { flex: 1 1 auto; min-height: 0; position: relative; }
  /* xterm 容器。A′ 增量1:忠实视图按【桌面宽】渲染(term.resize 到桌面 cols/rows,不再 fit 到
     浏览器)→ 与桌面像素对齐、宽度不匹配的折行 artifact 消失。桌面宽通常比手机宽 → overflow:auto
     给横/纵滑动(忠实保底"大不了缩放/横滑")。absolute inset:0 = 永远填满 #stage、尺寸恒定。 */
  /* 砖2 W2:每个【看过的 tab】各留一个 xterm 实例,各自一个 .termhost(absolute inset:0
     叠在 #stage 里),同一时刻只显示当前 viewed 的那个(display 切换),其余隐藏不 dispose
     → 切回瞬时无重建闪烁。样式与原 #term 一致(忠实视图保底)。 */
  .termhost {
    position: absolute; inset: 0; padding: .25rem;
    overflow: auto; -webkit-overflow-scrolling: touch;
    touch-action: pan-x pan-y; overscroll-behavior: contain;
  }
  /* A′ ccchrome 忠实视图滚动修复:xterm.js 自带的 .xterm-viewport(绝对定位铺满、
     overflow-y:scroll)是个内层纵向滚动容器,会抢走触摸/滚轮去滚它的 scrollback ——
     纵向【逐行步进】(ydisp 按整行重画 = 卡顿)、且抢走手势时外层 #term 的 2D 横向
     就动不了(= 上下卡住时左右也滚不动)。xterm 无任何 touch 事件监听(只靠这个原生
     overflow 滚动)→ 给 viewport 加 pointer-events:none,触摸/滚轮直接穿透到外层 #term,
     由 #term 独占平滑 2D 平移(X+Y 互不阻塞、纯本地 DOM、与网络无关)。
     focus(mousedown 在 .xterm 根上)/ selection(在 .xterm-screen 上)走事件冒泡仍工作;
     live 跟随是程序性 scrollTop,不受 pointer-events 影响。代价:忠实视图在手机上不再能
     拖动 xterm scrollback(看历史用重排视图);忠实保底像素仍 1:1。 */
  .termhost .xterm-viewport { pointer-events: none !important; }
  /* A′ 增量2 / toggle-scroll:重排视图叠在 #term 上层。忠实视图(#term)是保底,重排是叠加。
     切到重排 = #reflow 显示(absolute inset:0 + 不透明黑底 + z-index 盖住 #term);#term 仍在
     原位、全尺寸(不 display:none、不缩 1px)→ ① xterm 隐藏 textarea 仍可聚焦打字(点 #reflow
     → term.focus());② xterm 渲染几何/滚动容器永不被扰动 → 往返切换后忠实滚动不退化。
     重排内容由 JS 从 xterm.js buffer 还原逻辑行(软折接回)→ <span>(颜色/粗体)+
     white-space:pre-wrap,浏览器按设备宽**原生重折**。 */
  #reflow {
    position: absolute; inset: 0; z-index: 2;
    overflow: auto; padding: .35rem .5rem;
    -webkit-overflow-scrolling: touch;
    font-family: "DejaVu Sans Mono", "Noto Sans Mono CJK SC", monospace;
    font-size: 14px; line-height: 1.3; color: #fff; background: #000;
  }
  #reflow .lline {
    white-space: pre-wrap; overflow-wrap: anywhere; word-break: break-word;
    min-height: 1.3em;
  }
  /* A′ 增量3:表格 widget —— 列对齐保留、表格内横向滚动,**绝不 cram-reflow**。 */
  #reflow .tbl-wrap {
    overflow-x: auto; -webkit-overflow-scrolling: touch; margin: .25rem 0; max-width: 100%;
  }
  #reflow table { border-collapse: collapse; font: inherit; }
  #reflow td, #reflow th {
    border: 1px solid #333; padding: 0 .45rem; white-space: pre;
    vertical-align: top; text-align: left;
  }
  #reflow th { font-weight: bold; background: #161616; }
  /* A′ ccchrome:全宽水平规则线(CC 输入框那条 ────)→ 一条 CSS 细线,不折成一摞 ─、不入表。 */
  #reflow hr.rule { border: 0; border-top: 1px solid #444; height: 0; margin: .5em 0; }
  /* A′ ccchrome:装饰方框(CC 输入框 chrome / banner)→ CSS 边框圆角块,内部内容正常 reflow。 */
  #reflow .boxblk {
    border: 1px solid #444; border-radius: .4rem;
    padding: .12rem .55rem; margin: .35rem 0; max-width: 100%;
  }
  /* 软键栏:底部一排可点控制键(手机软键盘没 ESC/Ctrl/方向键)。横向可滚,
     按钮够大可点(touch target)。占高度 → #term 变矮 → 本地 reflow,不回灌 daemon。 */
  #keys {
    flex: 0 0 auto; display: flex; gap: .3rem; align-items: stretch;
    padding: .35rem .4rem; background: #161616; border-top: 1px solid #2a2a2a;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  #keys button {
    flex: 0 0 auto; min-width: 2.6rem; min-height: 2.4rem; padding: 0 .6rem;
    background: #262626; color: #e0e0e0; border: 1px solid #3a3a3a;
    border-radius: .35rem; font-family: ui-monospace, "DejaVu Sans Mono", monospace;
    font-size: .95rem; cursor: pointer; user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
  }
  #keys button:active { background: #3a3a3a; }
  #keys button.wide { min-width: 4.2rem; }
  /* 砖2 W1:标签栏(手机端 tab 管理)。独立一行,置于顶栏下方、#stage 上方。横向可滚
     (tab 多了不换行),触摸热区够大(min-height 2.2rem)。≥1 tab 即显示(手机需 "+" 作为
     唯一的新建 tab 入口 → 单 tab 也显示,只一条窄条 + "+");仅 0 tab 时隐藏(.hidden)。
     标签栏是【叠加】,坏了切回忠实单 tab 仍工作(faithful 保底)。 */
  #tabbar {
    flex: 0 0 auto; display: flex; gap: .25rem; align-items: stretch;
    padding: .25rem .35rem; background: #101010;
    border-bottom: 1px solid #2a2a2a;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  #tabbar.hidden { display: none; }
  #tabbar .tab {
    flex: 0 0 auto; display: inline-flex; align-items: center; gap: .35rem;
    max-width: 11rem; min-height: 2.2rem; padding: 0 .25rem 0 .55rem;
    background: #1e1e1e; color: #cfcfcf; border: 1px solid #333;
    border-radius: .4rem; font-family: system-ui, sans-serif; font-size: .8rem;
    cursor: pointer; user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
  }
  /* 本客户端【正在看】的 tab(据 StreamFocus 高亮,绿框呼应共享色 #3fb950)。 */
  #tabbar .tab.viewed { background: #22331f; border-color: #3fb950; color: #f0f0f0; }
  #tabbar .tab .label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* 桌面焦点 tab 的标记(琥珀点)—— 手机各看各的,这标记指"桌面屏前那个"。 */
  #tabbar .tab .focusdot {
    flex: 0 0 auto; width: .4rem; height: .4rem; border-radius: 50%; background: #e3b341;
  }
  #tabbar .tab .close {
    flex: 0 0 auto; width: 1.5rem; height: 1.5rem; display: inline-flex;
    align-items: center; justify-content: center; border-radius: .3rem;
    color: #9a9a9a; font-size: 1.05rem; line-height: 1;
  }
  #tabbar .tab .close:active { background: #5a2020; color: #fff; }
  #tabbar .newtab {
    flex: 0 0 auto; min-width: 2.2rem; min-height: 2.2rem; display: inline-flex;
    align-items: center; justify-content: center; background: #1e1e1e; color: #cfcfcf;
    border: 1px solid #333; border-radius: .4rem; font-size: 1.15rem; line-height: 1;
    cursor: pointer; user-select: none; -webkit-user-select: none; touch-action: manipulation;
  }
  #tabbar .newtab:active { background: #2a2a2a; }
  /* F4:按窗口(workspace)分段。单窗口无 .seghdr/.segdiv → 视觉≈原来的单栏(不退化)。
     多窗口:每段前一条竖分隔 + 一个窗口标签(锚窗口=home 用共享绿标)。 */
  #tabbar .seg { flex: 0 0 auto; display: inline-flex; align-items: stretch; gap: .25rem; }
  #tabbar .segdiv {
    flex: 0 0 auto; width: 1px; align-self: center; height: 1.4rem; background: #333;
    margin: 0 .3rem;
  }
  #tabbar .seghdr {
    flex: 0 0 auto; display: inline-flex; align-items: center; white-space: nowrap;
    color: #8a8a8a; font-family: system-ui, sans-serif; font-size: .7rem; padding: 0 .15rem;
    user-select: none; -webkit-user-select: none;
  }
  #tabbar .seghdr.anchor { color: #3fb950; }   /* 共享锚窗口(home,新 tab 落点)= 共享色 */
</style>
</head>
<body>
  <div id="bar">
    <span id="dot"></span>
    <span id="title">quill</span>
    <button id="modebtn" type="button">重排视图</button>
    <span id="status">连接中…</span>
  </div>
  <!-- 砖2 W1:标签栏。内容由 JS 从 ServerMsg::Workspace(tab 列表)渲染,点 tab=Select、
       + = New、× = Close。初始 hidden;收到 tab 列表后 ≥1 tab 即显示(手机需 "+" 建 tab),
       仅 0 tab 隐藏。 -->
  <div id="tabbar" class="hidden"></div>
  <!-- A′ toggle-scroll:#term 与 #reflow 同居一个 position:relative 的 #stage,各自
       absolute inset:0(同尺寸叠放)。切重排 = #reflow 不透明盖在 #term 上;#term 永远
       保持全尺寸(绝不缩成 1px)→ xterm 几何/滚动容器永不被扰动,往返切换后忠实滚动不退化。 -->
  <div id="stage">
    <!-- 砖2 W2:每 tab 一个 .termhost 由 JS 动态插入此处(#reflow 之前);同一刻只显示当前 tab。 -->
    <!-- A′ 增量2/3:重排视图(从 xterm.js buffer 还原逻辑行 → CSS 重排 + 表格 widget)。
         默认隐藏(忠实视图保底),点顶栏按钮切换。 -->
    <div id="reflow" style="display:none"></div>
  </div>
  <!-- 软键栏:按钮在 JS 里据 SOFTKEYS 表生成(避免在 HTML 属性里写转义字节) -->
  <div id="keys"></div>

<script src="/vendor/xterm.js"></script>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
const dotEl = $("dot"), titleEl = $("title"), statusEl = $("status");

// 重连退避(ms):断线非事件(R1),后台/锁屏/网络抖动回来自动重连重放。
const RECONNECT_MS = 1000;

// ── 砖2 W2:每 tab 一个 xterm 实例(保暖切换)─────────────────────────────────────────
// 后端一次只流【本客户端 viewed 的那个 tab】的字节(切 tab = TabOp::Select → 后端发
// StreamFocus + 重放目标 tab 环缓冲)。为了切回【看过的 tab】瞬时无重建闪烁,给每个看过的
// tab 各留一个 xterm 实例(隐藏而非 dispose):切回先【瞬时显示其上次状态】(无空屏),随后
// 到达的重放帧一次 reset+write 更新到当前(pendingReset,见 onmessage)→ 无空白闪。有界
// (超 MAX_WARM_TERMS 淘汰最久没看的、且非当前 viewed 的实例,防内存无限涨)。
// `term` = 当前 viewed 实例的 Terminal(所有 reflow/读取代码都读这个变量,切换时重新指向)。
const stageEl = $("stage");
const MAX_WARM_TERMS = 6;
// F4:键 = (ws, tab) 复合键。tab_id 是【每窗口进程】的 atomic(各起步 1)→ 跨窗口会撞;
// 字节流身份 = (ws, tab)(kernel rings / StreamFocus 都带 ws)→ 保暖实例也必须按 (ws,tab) 分。
const viewKey = (ws, tab) => ws + ":" + tab;
const termInstances = new Map();  // "ws:tab" -> { term, host, lastUsed, pendingReset }
let term = null;                  // 当前 viewed 实例(懒建,首个 StreamFocus 后非空)
let curInst = null;               // 当前 viewed 实例的记录(pendingReset 挂它上)
let curDims = null;               // 最近的桌面 dims { cols, rows }(新实例按此 resize)
let lruSeq = 0;                   // 单调递增的"最近使用"序号(淘汰最久没看的)

function newTerminal() {
  return new Terminal({
    convertEol: false,          // daemon 转发原始字节,换行语义由字节流自带,别替客户端改
    cursorBlink: true,
    fontFamily: '"DejaVu Sans Mono", "Noto Sans Mono CJK SC", monospace',
    fontSize: 14,
    scrollback: 10000,
    theme: { background: "#000000" },
  });
}

// 新建一个 tab 的 xterm 实例(host 可见插入 #reflow 之前 → 测量布局正确;调用方随即在
// showInstance 里隐藏别的)。每实例各自注册 onData/onBinary/onWriteParsed/onTitleChange
// (只有当前 active 实例收字节 / 有焦点,故背景实例的这些回调实际不触发;仍逐实例注册求正确)。
function makeTermInstance(key) {
  const host = document.createElement("div");
  host.className = "termhost";
  stageEl.insertBefore(host, reflowEl);
  const t = newTerminal();
  t.open(host);
  if (curDims) { try { t.resize(curDims.cols, curDims.rows); } catch (_) {} }
  t.onData((d) => sendStr(d));
  t.onBinary((s) => {
    const u8 = new Uint8Array(s.length);
    for (let i = 0; i < s.length; i++) u8[i] = s.charCodeAt(i) & 0xff;
    sendBytes(u8);
  });
  t.onWriteParsed(() => { if (t === term) scheduleReflowRender(); });
  t.onTitleChange((title) => { if (t === term) titleEl.textContent = title && title.length ? title : "quill"; });
  const inst = { term: t, host, lastUsed: ++lruSeq, pendingReset: false };
  termInstances.set(key, inst);
  return inst;
}

// 淘汰:超上限时,dispose 最久没看的、且不是当前 viewed 的实例(连 DOM host 一起移除)。
function evictWarmTerms() {
  const keep = viewKey(viewedWs, viewedTab);
  while (termInstances.size > MAX_WARM_TERMS) {
    let victimKey = null, victimUsed = Infinity;
    for (const [k, inst] of termInstances) {
      if (k === keep) continue;                       // 绝不淘汰当前在看的
      if (inst.lastUsed < victimUsed) { victimUsed = inst.lastUsed; victimKey = k; }
    }
    if (victimKey === null) break;
    const v = termInstances.get(victimKey);
    try { v.term.dispose(); } catch (_) {}
    if (v.host && v.host.parentNode) v.host.parentNode.removeChild(v.host);
    termInstances.delete(victimKey);
  }
}

// 切到 (ws, tab) 的实例:get-or-create(首次看才建 = "从 kernel 重放重建");显示它、隐藏
// 其余;重新指向 `term`/`curInst`;更新 LRU;有界淘汰。返回该实例。
function showInstance(ws, tab) {
  const key = viewKey(ws, tab);
  let inst = termInstances.get(key);
  const fresh = !inst;
  if (fresh) inst = makeTermInstance(key);
  for (const [k, i2] of termInstances) i2.host.style.display = (k === key) ? "" : "none";
  term = inst.term;
  curInst = inst;
  inst.lastUsed = ++lruSeq;
  // 新建:按桌面宽 resize(在可见状态下,布局正确);保暖:强制在新可见状态重绘一次。
  if (fresh) { if (curDims) { try { inst.term.resize(curDims.cols, curDims.rows); } catch (_) {} } }
  else { try { inst.term.refresh(0, inst.term.rows - 1); } catch (_) {} }
  evictWarmTerms();
  return inst;
}

// ── A′ 增量1:忠实视图按【桌面宽】渲染 ─────────────────────────────────────────────
// 桌面把字节流按桌面 cols/rows 烤死;客户端必须用【同一个宽】渲染才能
// 与桌面像素对齐(否则整宽 `─────` 横线被 xterm 按窄宽重折成一摞 = 宽度不匹配 artifact)。
// 故收到 ServerMsg::Dims → term.resize(cols, rows) 设成桌面宽,**不再 fit 到浏览器**。
// 桌面宽通常比手机宽 → #term 横/纵滑动(忠实保底)。响应式重排是增量2。
function applyDims(cols, rows) {
  if (!Number.isInteger(cols) || !Number.isInteger(rows) || cols < 1 || rows < 1) return;
  curDims = { cols, rows };            // 记住桌面宽 → 之后新建的 tab 实例也按此 resize
  for (const inst of termInstances.values()) {   // 所有看过的实例都跟着桌面宽(切回宽度一致)
    if (inst.term.cols === cols && inst.term.rows === rows) continue;
    try { inst.term.resize(cols, rows); } catch (_) {}
  }
  scheduleReflowRender();  // 桌面宽变 → xterm 重排 buffer → 重排视图也得重画(若在重排模式)
}

// ── A′ 增量2:逻辑行 CSS 重排视图 ─────────────────────────────────────────────────
// 忠实视图(xterm.js #term)是【永远正确的保底】;重排是【纯增益叠加】(坏了一键切回忠实)。
// 做法:从 xterm.js `term.buffer.active` 还原**逻辑行 + 每格属性** —— 把 isWrapped 的软折
// 连续行接回整条逻辑行,逐格取字符 + fg/bg/bold/italic/下划线/删除线/反显/暗/隐藏,RLE 成
// <span>(颜色/粗体…)→ 容器 white-space:pre-wrap;overflow-wrap:anywhere → 浏览器按**设备宽
// 原生重折**(字面意义的响应式网页),不焊死桌面宽。表格走增量3 的可横滑 widget。
const reflowEl = $("reflow"), modeBtn = $("modebtn");
const REFLOW_MAX_ROWS = 6000;   // 重排只回溯最近这么多 buffer 行(忠实视图仍有全量滚回)
const REFLOW_THROTTLE_MS = 90;  // live 写入节流(coalesce 一拍重画,避免每帧重建 DOM)

// xterm.js 默认 ANSI 16(Tango)+ 6×6×6 cube + 24 级灰 = 256 色板(与忠实视图配色一致)。
const PALETTE = (function buildPalette() {
  const p = new Array(256);
  const base = [
    "#2e3436", "#cc0000", "#4e9a06", "#c4a000", "#3465a4", "#75507b", "#06989a", "#d3d7cf",
    "#555753", "#ef2929", "#8ae234", "#fce94f", "#729fcf", "#ad7fa8", "#34e2e2", "#eeeeec",
  ];
  for (let i = 0; i < 16; i++) p[i] = base[i];
  const h2 = (v) => v.toString(16).padStart(2, "0");
  const lv = [0, 95, 135, 175, 215, 255];
  for (let i = 0; i < 216; i++) {
    p[16 + i] = "#" + h2(lv[Math.floor(i / 36) % 6]) + h2(lv[Math.floor(i / 6) % 6]) + h2(lv[i % 6]);
  }
  for (let i = 0; i < 24; i++) { const v = 8 + i * 10; p[232 + i] = "#" + h2(v) + h2(v) + h2(v); }
  return p;
})();
// xterm.js 默认前/背景(主题只覆盖了 background=#000000,前景保持 xterm 默认白)。
const DEFAULT_FG = "#ffffff", DEFAULT_BG = "#000000";

function resolveColor(isDefault, isRGB, isPalette, raw, dflt) {
  if (isDefault) return dflt;
  if (isRGB) return "#" + (raw & 0xffffff).toString(16).padStart(6, "0");
  if (isPalette) return PALETTE[raw & 0xff] || dflt;
  return dflt;
}

// 把一个 xterm.js cell 的视觉属性编成内联 CSS 串(空串 = 纯默认,渲成裸文本节点不包 span)。
// 同款 CSS 串的连续 cell 会被 RLE 合成一个 span(见 appendRuns)。CSS 串本身即 RLE 比较键。
function cellCss(cell) {
  let fg = resolveColor(cell.isFgDefault(), cell.isFgRGB(), cell.isFgPalette(), cell.getFgColor(), DEFAULT_FG);
  let bg = resolveColor(cell.isBgDefault(), cell.isBgRGB(), cell.isBgPalette(), cell.getBgColor(), DEFAULT_BG);
  let emitBg = !cell.isBgDefault();
  const bold = !!cell.isBold();
  // bold 把暗色 ANSI(0-7)提亮成 bright(8-15)—— 对齐 xterm.js drawBoldTextInBrightColors 默认。
  if (bold && cell.isFgPalette()) {
    const idx = cell.getFgColor() & 0xff;
    if (idx < 8) fg = PALETTE[idx + 8] || fg;
  }
  if (cell.isInverse()) { const t = fg; fg = bg; bg = t; emitBg = true; }
  const parts = [];
  if (fg !== DEFAULT_FG) parts.push("color:" + fg);
  if (emitBg) parts.push("background:" + bg);
  if (bold) parts.push("font-weight:bold");
  if (cell.isItalic()) parts.push("font-style:italic");
  const deco = [];
  if (cell.isUnderline()) deco.push("underline");
  if (cell.isStrikethrough()) deco.push("line-through");
  if (deco.length) parts.push("text-decoration:" + deco.join(" "));
  if (cell.isDim()) parts.push("opacity:.6");
  if (cell.isInvisible()) parts.push("visibility:hidden");
  return parts.join(";");
}

// 从 xterm.js buffer 还原逻辑行数组。每条 = { cells:[{ch,css}], cols:[单字符], text }:
// cells 给渲染(原字符,含组合字符/宽字符);cols/text 给探测+切列(每 cell 恰好 1 个代表
// 字符 → text 下标 ↔ cell 下标严格对齐,表格切列才能按字符位置切回带属性的 cell)。
function buildLogicalLines() {
  if (!term) return [];        // 砖2 W2:首个 StreamFocus 前无 term 实例
  const buf = term.buffer.active;
  const total = buf.length;
  const start = Math.max(0, total - REFLOW_MAX_ROWS);
  const out = [];
  let cur = null, cell;
  for (let y = start; y < total; y++) {
    const line = buf.getLine(y);
    if (!line) continue;
    if (cur === null || !line.isWrapped) { cur = { cells: [], cols: [] }; out.push(cur); }
    const w = line.length;
    for (let x = 0; x < w; x++) {
      cell = line.getCell(x, cell);
      if (!cell) continue;
      if (cell.getWidth() === 0) continue;     // 宽字符的后半格占位,跳过
      let ch = cell.getChars();
      if (ch === "") ch = " ";
      cur.cells.push({ ch, css: cellCss(cell) });
      cur.cols.push(ch.length === 1 ? ch : (ch[0] || " "));
    }
  }
  for (const ll of out) {
    // 裁掉行尾的【纯默认空格】(网格右侧 padding)→ 重排不被尾随空白撑乱;带背景色的色条
    // (css 非空)保留。
    let n = ll.cells.length;
    while (n > 0) { const c = ll.cells[n - 1]; if ((c.ch === " " || c.ch === "") && c.css === "") n--; else break; }
    if (n !== ll.cells.length) { ll.cells.length = n; ll.cols.length = n; }
    ll.text = ll.cols.join("");
  }
  return out;
}

// 把 cells[a,b) 按 CSS 串 RLE 成 span/文本节点 append 进 parent。
function appendRuns(parent, cells, a, b) {
  let i = a;
  while (i < b) {
    const css = cells[i].css;
    let j = i + 1;
    while (j < b && cells[j].css === css) j++;
    let txt = "";
    for (let k = i; k < j; k++) txt += cells[k].ch;
    if (css === "") { parent.appendChild(document.createTextNode(txt)); }
    else { const sp = document.createElement("span"); sp.style.cssText = css; sp.textContent = txt; parent.appendChild(sp); }
    i = j;
  }
}

// 一条逻辑行 → 一个重排 <div>(pre-wrap 容器,浏览器按设备宽重折)。
function reflowLineDiv(ll) {
  const div = document.createElement("div");
  div.className = "lline";
  appendRuns(div, ll.cells, 0, ll.cells.length);
  return div;
}

// ── A′ 增量3:表格 widget(可横滑、列对齐保留,**绝不 cram-reflow**)─────────────────
// 在逻辑行上探测表格:① 带框(│─┼┌┐ 等)确定性解析;② 无框但多行列对齐的启发式(连续行
// 在相同列位置有 ≥2 空格分隔)。命中 → <table> 包在 overflow-x:auto 容器(列对齐保留、表内
// 横滑)。探不出结构的 2D → 退回逐行重排(忠实保底永远一键可回)。
const VBAR = new Set(["│", "║", "┃", "|"]);
const HBARISH = new Set(["─", "━", "═", "┄", "┅", "┈", "┉", "╌", "╍", "-", "="]);
const JUNCT = new Set(["┼", "┿", "╪", "╋", "╬", "┤", "├", "┬", "┴", "┌", "┐", "└", "┘",
  "╔", "╗", "╚", "╝", "╠", "╣", "╦", "╩", "╭", "╮", "╯", "╰", "╞", "╡", "╥", "╨", "+"]);
const BORDER = new Set([...VBAR, ...HBARISH, ...JUNCT]);

// ── A′ ccchrome:框线 chrome(CC 输入框那条全宽 ──── / 圆角方框)优雅化 ──────────────
// 全宽水平规则线 = 整行只由横线类(─━═…)+ 接点/端角(╭╮╰╯┌┐…)组成、且含足够多横线
// (≥8)。pre-wrap 下它会被折成一摞短横线(很难看)→ 改渲成一条 CSS 细线(<hr>)。
// 注:盒线 │/| 不算规则字符(含竖线的是表格/方框分隔,不是裸横线)。
const RULECH = new Set([...HBARISH, ...JUNCT]);
function isFullWidthRule(ll) {
  const t = ll.text.trim();
  if (t.length < 8) return false;
  let hbar = 0;
  for (const ch of t) {
    if (ch === " ") continue;
    if (!RULECH.has(ch)) return false;       // 任何非规则字符(字母/竖线…)→ 不是纯规则线
    if (HBARISH.has(ch)) hbar++;
  }
  return hbar >= 8;
}

function isBlankLine(ll) {
  if (ll.cells.length === 0) return true;
  for (let c = 0; c < ll.text.length; c++) if (ll.text[c] !== " ") return false;
  return true;
}
function hasVBar(text) { for (let c = 0; c < text.length; c++) if (VBAR.has(text[c])) return true; return false; }
// 盒绘竖线(不含 ASCII `|`)= 表格强信号。裸 `|` 太常见(git log --graph / shell 管道 a|b /
// 代码),单凭它判表会把高频管道内容 cram 成乱码表(违反「增强永不比保底差」)。
const STRONG_VBAR = new Set(["│", "║", "┃"]);
function hasStrongVBar(text) { for (let c = 0; c < text.length; c++) if (STRONG_VBAR.has(text[c])) return true; return false; }
// 分隔/规则行 SEPSET = 横线类 + 接点 + markdown 对齐冒号(竖线另算)。
const SEPSET = new Set([...HBARISH, ...JUNCT, ":"]);
// 分隔行:非空、非空白字符全是【竖线 或 SEPSET】、且含 ≥1 横线类字符、长度 ≥3。覆盖盒线
// (├─┼─┤ / ┌─┬─┐)、ascii(+---+)、markdown(---|--- / :--:|---:)、纯横线(─────)。注意它
// **可含竖线**(markdown 分隔行带 |),所以判别独立于 hasVBar —— 含竖线的分隔行仍是分隔行
// 不是内容行(修 ---|--- 被误当数据行 + header 漏标)。
function isSeparatorRow(text) {
  const t = text.trim();
  if (t.length < 3) return false;
  let hbar = 0;
  for (const ch of t) {
    if (ch === " ") continue;
    if (VBAR.has(ch)) continue;
    if (!SEPSET.has(ch)) return false;
    if (HBARISH.has(ch)) hbar++;
  }
  return hbar >= 1;
}

// 带框表格块:从 i 起最大连续"表格行"(含竖线 或 是分隔行)的区间 [i, end);需 ≥1 含竖线的
// 内容行 + (≥2 内容行 或 ≥1 分隔行)。不满足返 -1。分隔行(含 ---|--- 这种带竖线的)算 rule
// 不算 content。
function borderedTableEnd(lines, i) {
  let j = i, content = 0, rule = 0, strong = false;
  while (j < lines.length) {
    if (isBlankLine(lines[j])) break;
    const t = lines[j].text;
    const sep = isSeparatorRow(t), vbar = hasVBar(t);
    if (!vbar && !sep) break;
    if (sep) rule++; else content++;
    if (hasStrongVBar(t)) strong = true;
    j++;
  }
  // 强信号必须有:盒绘竖线 │ 或 分隔行(markdown ---|---)。裸 ASCII | 内容(git log --graph /
  // shell 管道 / 代码)无强信号 → 不当表,退回逐行重排,保底永不被 cram 成乱码表。
  if (content >= 1 && (content >= 2 || rule >= 1) && (strong || rule >= 1)) return j;
  return -1;
}

// 一行按竖线位置切出列范围 [start,end)(竖线本身不含);丢掉外框造成的首/尾空白段。
function vbarColumns(ll) {
  const text = ll.text;
  const segs = [];
  let prev = 0;
  for (let c = 0; c < text.length; c++) {
    if (VBAR.has(text[c])) { segs.push([prev, c]); prev = c + 1; }
  }
  segs.push([prev, text.length]);
  const ws = (a, b) => { for (let c = a; c < b; c++) if ((ll.cols[c] || " ") !== " ") return false; return true; };
  if (segs.length && ws(segs[0][0], segs[0][1])) segs.shift();
  if (segs.length && ws(segs[segs.length - 1][0], segs[segs.length - 1][1])) segs.pop();
  return segs.length ? segs : [[0, text.length]];
}

// 无框对齐表格启发式:[i,end) 是一段无空行的连续行;≥3 行、存在【所有行都是空白】的内部
// 列(宽 ≥2 = 列分隔,区别于散文的单空格词距),且 ≥60% 行在 ≥2 列里有内容(真二维表,
// 非偶合)。命中返列范围数组,否则 null。
function unborderedColumns(lines, i, end) {
  const rows = [];
  for (let k = i; k < end; k++) rows.push(lines[k].text);
  if (rows.length < 3) return null;
  let maxW = 0;
  for (const r of rows) if (r.length > maxW) maxW = r.length;
  if (maxW < 3) return null;
  const at = (r, c) => (c < r.length ? r[c] : " ");
  const isGap = new Array(maxW);
  for (let c = 0; c < maxW; c++) {
    let g = true;
    for (const r of rows) if (at(r, c) !== " ") { g = false; break; }
    isGap[c] = g;
  }
  const seps = [];
  let c = 0;
  while (c < maxW) {
    if (!isGap[c]) { c++; continue; }
    const s = c;
    while (c < maxW && isGap[c]) c++;
    if (c - s >= 2) {
      let before = false, after = false;
      for (let k = 0; k < s; k++) if (!isGap[k]) { before = true; break; }
      for (let k = c; k < maxW; k++) if (!isGap[k]) { after = true; break; }
      if (before && after) seps.push([s, c]);
    }
  }
  if (seps.length < 1) return null;
  const cols = [];
  let prev = 0;
  for (const [s, e] of seps) { cols.push([prev, s]); prev = e; }
  cols.push([prev, maxW]);
  if (cols.length < 2) return null;
  let good = 0;
  for (const r of rows) {
    let nonEmpty = 0;
    for (const [s, e] of cols) {
      let has = false;
      for (let cc = s; cc < e; cc++) if (at(r, cc) !== " ") { has = true; break; }
      if (has) nonEmpty++;
    }
    if (nonEmpty >= 2) good++;
  }
  return good >= Math.ceil(rows.length * 0.6) ? cols : null;
}

// 在 cells[a,b) 内去掉首尾空白后渲染进单元格(列对齐靠 <td> + white-space:pre,内部空格保留)。
function appendTrimmedCell(parent, ll, a, b) {
  let s = a, e = Math.min(b, ll.cells.length);
  while (s < e && (ll.cols[s] || " ") === " ") s++;
  while (e > s && (ll.cols[e - 1] || " ") === " ") e--;
  if (s < e) appendRuns(parent, ll.cells, s, e);
  else parent.appendChild(document.createTextNode(""));
}
function wrapTable(tbl) {
  const wrap = document.createElement("div");
  wrap.className = "tbl-wrap";
  wrap.appendChild(tbl);
  return wrap;
}
function buildBorderedTable(lines, i, end) {
  let headerRow = -1, c0 = -1;
  // 首个内容行(含竖线且不是分隔行)。分隔行(┌─┬┐ / ---|---)不算内容。
  for (let k = i; k < end; k++) if (hasVBar(lines[k].text) && !isSeparatorRow(lines[k].text)) { c0 = k; break; }
  if (c0 >= 0) {
    for (let k = c0 + 1; k < end; k++) {
      if (isSeparatorRow(lines[k].text)) { headerRow = c0; break; }  // 首内容行后紧跟分隔行 → header
      if (hasVBar(lines[k].text)) break;                             // 先遇到另一内容行 → 无 header
    }
  }
  const tbl = document.createElement("table");
  for (let k = i; k < end; k++) {
    const ll = lines[k];
    if (isSeparatorRow(ll.text)) continue;   // 跳过分隔/规则行(含 ---|--- 这种带竖线的)
    const tr = document.createElement("tr");
    for (const [a, b] of vbarColumns(ll)) {
      const td = document.createElement(k === headerRow ? "th" : "td");
      appendTrimmedCell(td, ll, a, b);
      tr.appendChild(td);
    }
    tbl.appendChild(tr);
  }
  return wrapTable(tbl);
}
function buildUnborderedTable(lines, i, end, cols) {
  const tbl = document.createElement("table");
  for (let k = i; k < end; k++) {
    const ll = lines[k];
    const tr = document.createElement("tr");
    for (const [a, b] of cols) {
      const td = document.createElement("td");
      appendTrimmedCell(td, ll, a, b);
      tr.appendChild(td);
    }
    tbl.appendChild(tr);
  }
  return wrapTable(tbl);
}

// 单逻辑行 → 节点:全宽规则线渲成一条 CSS 细线(<hr class=rule>,不折成一摞 ─);
// 否则普通逐行重排 div。空行也走这(非规则 → 仍是 .lline 占位)。
function reflowLineNode(ll) {
  if (isFullWidthRule(ll)) { const hr = document.createElement("hr"); hr.className = "rule"; return hr; }
  return reflowLineDiv(ll);
}

// 装饰方框判据:带框区域里【内容行最多 1 列】= 不是二维数据表,是给文字套了个框
// (CC 输入框 chrome / banner)。真数据表(任一内容行 ≥2 列)→ false,仍走可横滑表 widget。
function isDecorativeBox(lines, i, end) {
  let maxCols = 0;
  for (let k = i; k < end; k++) {
    const ll = lines[k];
    if (isSeparatorRow(ll.text) || !hasVBar(ll.text)) continue;
    const n = vbarColumns(ll).length;
    if (n > maxCols) maxCols = n;
  }
  return maxCols <= 1;
}
// 装饰方框 → CSS 边框块:剥掉框线(顶/底/内部横分隔)、内部内容当普通逻辑行 reflow
// (pre-wrap 按设备宽重折),外面套一个带边框圆角的块。绝不 cram 成 2D 滚表。
function buildBoxBlock(lines, i, end) {
  const blk = document.createElement("div");
  blk.className = "boxblk";
  for (let k = i; k < end; k++) {
    const ll = lines[k];
    if (isSeparatorRow(ll.text)) continue;   // 框线(┌──┐ / ╰──╯ / ├──┤)= 装饰,丢掉
    const div = document.createElement("div");
    div.className = "lline";
    let first = true;
    for (const [a, b] of vbarColumns(ll)) {  // 单列盒(maxCols=1)= 一段;剥掉外框竖线后的内文
      if (!first) div.appendChild(document.createTextNode(" "));
      appendTrimmedCell(div, ll, a, b);
      first = false;
    }
    blk.appendChild(div);
  }
  return blk;
}

// 整屏重排:逐逻辑行流式发出 —— 空行 / 带框表格 / 无框对齐表格 / 退回逐行重排。
function renderReflow() {
  const lines = buildLogicalLines();
  const frag = document.createDocumentFragment();
  let i = 0;
  while (i < lines.length) {
    if (isBlankLine(lines[i])) { frag.appendChild(reflowLineNode(lines[i])); i++; continue; }
    const be = borderedTableEnd(lines, i);   // 带框表格/装饰方框优先(确定性)
    if (be > i) {
      frag.appendChild(isDecorativeBox(lines, i, be) ? buildBoxBlock(lines, i, be) : buildBorderedTable(lines, i, be));
      i = be; continue;
    }
    let j = i;                               // 最大连续非空行段
    while (j < lines.length && !isBlankLine(lines[j])) j++;
    const cols = unborderedColumns(lines, i, j);
    if (cols) { frag.appendChild(buildUnborderedTable(lines, i, j, cols)); i = j; continue; }
    // 段内可能含【散文后紧跟的带框表格/方框】(无空行分隔)→ 逐行走,带框处再拦一次。
    let k = i;
    while (k < j) {
      const b2 = borderedTableEnd(lines, k);
      if (b2 > k) {
        frag.appendChild(isDecorativeBox(lines, k, b2) ? buildBoxBlock(lines, k, b2) : buildBorderedTable(lines, k, b2));
        k = b2;
      } else { frag.appendChild(reflowLineNode(lines[k])); k++; }
    }
    i = j;
  }
  swapReflow(frag);
}

// 换入新内容,保「贴底跟随」:换前若已滚到底,换后继续贴底(像终端 tail)。
function swapReflow(frag) {
  const el = reflowEl;
  const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 8;
  el.replaceChildren(frag);
  if (atBottom) el.scrollTop = el.scrollHeight;
}

let viewMode = "faithful";   // 'faithful'(保底)| 'reflow'(增益)
let reflowPending = false;
function scheduleReflowRender() {
  if (viewMode !== "reflow" || reflowPending) return;
  reflowPending = true;
  setTimeout(() => { reflowPending = false; if (viewMode === "reflow") { try { renderReflow(); } catch (_) {} } }, REFLOW_THROTTLE_MS);
}
function setViewMode(m) {
  viewMode = m;
  const reflow = (m === "reflow");
  // 重排 = #reflow 不透明盖在 #term 上(display 切换);#term 不动、不缩(textarea 仍可聚焦
  // 打字),xterm 几何恒定 → 往返不退化。切回忠实只补一次重绘(几何没变,纯保险)。
  reflowEl.style.display = reflow ? "" : "none";
  modeBtn.textContent = reflow ? "忠实视图" : "重排视图";
  if (reflow) { try { renderReflow(); } catch (_) {} }
  else if (term) { try { term.refresh(0, term.rows - 1); } catch (_) {} }
}
modeBtn.addEventListener("click", () => setViewMode(viewMode === "reflow" ? "faithful" : "reflow"));
// 重排模式下点内容区 → 聚焦 xterm 隐藏 textarea(手机弹软键盘,重排下也能打字;软键栏始终可用)。
reflowEl.addEventListener("pointerup", () => { if (viewMode === "reflow" && term) { try { term.focus(); } catch (_) {} } });
// 砖2 W2:onWriteParsed / onData / onBinary / onTitleChange 改为逐实例注册(见 makeTermInstance)。

// ── 输入回灌(片2):键盘/方向键/粘贴/IME → WS 二进制帧 → daemon → active tab PTY ──
// 发原始字节(二进制帧),与片1 出站 Binary 对称;daemon 收到直接写 PTY。`ws` 是
// 下面的 let 变量,重连会换实例 —— 这里读闭包里的当前 ws,不捕获旧实例。
function sendBytes(u8) {
  if (ws && ws.readyState === WebSocket.OPEN && u8 && u8.length) ws.send(u8);
}
// onData 给的是 UTF-8 文本(普通键 + Enter=\r + Ctrl-C=\x03 + 方向键=\x1b[A… 由
// xterm 编码好,含粘贴/IME 上屏);TextEncoder 编 UTF-8 后发。
const enc = new TextEncoder();
function sendStr(s) { sendBytes(enc.encode(s)); }
// 注:onData(VT 字节串)/ onBinary(latin1 二进制串,如鼠标上报)的回发在 makeTermInstance
// 里逐实例注册 —— 只有当前 active 实例有焦点会触发,输入始终去本客户端 viewed 的 tab。

// ── 软键栏:手机软键盘没有的键,各发对应控制字节(与桌面 wl/keyboard.rs 同款序列)──
// label, 字节序列, 是否宽按钮
const SOFTKEYS = [
  ["Esc",     "\x1b",     false],
  ["Esc·Esc", "\x1b\x1b", true ],  // CC 双击 ESC 撤回上一次修改
  ["^C",      "\x03",     false],  // SIGINT
  ["^D",      "\x04",     false],  // EOF
  ["Tab",     "\x09",     false],
  ["⇧Tab",    "\x1b[Z",   true ],  // BackTab (CSI Z)
  ["←",       "\x1b[D",   false],
  ["↑",       "\x1b[A",   false],
  ["↓",       "\x1b[B",   false],
  ["→",       "\x1b[C",   false],
];
(function buildSoftKeys() {
  const keysEl = $("keys");
  for (const [label, seq, wide] of SOFTKEYS) {
    const b = document.createElement("button");
    b.textContent = label;
    if (wide) b.className = "wide";
    // pointerdown + preventDefault:统一鼠标/触摸只触发一次,且**不抢焦点** ——
    // 否则点按钮会 blur xterm 的隐藏 textarea,手机收起系统软键盘 / onData 失效。
    b.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      sendStr(seq);
      if (term) term.focus();
    });
    keysEl.appendChild(b);
  }
})();

function setLive(live, text) {
  dotEl.classList.toggle("live", live);
  statusEl.textContent = text;
}

// ── 控制面(T6 块C):WS **Text** 帧 = JSON;数据面(PTY 字节)走 **Binary**,两者分离。
//    出站 = ClientMsg(Hold / Release);入站 = ServerMsg(工作区列表 / 字节流标签 →
//    从中学到 active workspace id,Release 时回带)。──────────────────────────────────
let activeWorkspaceId = null;  // 由入站 ServerMsg 学得
let held = false;              // 是否已对本连接发过 Hold(每次新连接重置)
// 控制消息走 Text 帧(ws.send(string));与输入字节(sendBytes → Binary)区分。
function sendControl(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}
// 学到 active workspace id 后显式 Hold 一次(成为 holder;daemon 转 Live 也隐式 hold,
// HashSet 幂等,不重复计)。
function holdOnce() {
  if (!held && activeWorkspaceId !== null) {
    sendControl({ Hold: { workspace_id: activeWorkspaceId } });
    held = true;
  }
}
// ── F4:按窗口(workspace)分段的标签栏(联邦:一个 kernel 聚合全部窗口)──────────────────
// K1a/K1b 后 kernel 把【每个】feeder(窗口)的 WorkspaceInfo 发给全部客户端 → 手机能画全部
// 窗口的 tab。状态:
//   workspaces = Map<ws_id, { tabs:[{tab_id,title}], active:桌面焦点下标 }>(由每条 Workspace 更新)
//   wsOrderIds = 窗口顺序(据 Workspaces 列表,后端已按 ws_id 稳定排)
//   anchorWs   = 共享锚窗口 ws = home = 新 tab 落点(Workspaces.active)
//   viewedWs / viewedTab = 本客户端在看的 (ws, tab)(据 StreamFocus,绿框高亮,跨所有段唯一)
// 单窗口 = 一个段、无窗口标签/分隔 → 视觉≈原来的单栏(不退化)。标签栏是【叠加】,坏了忠实
// 单 tab 视图仍工作。
const tabbarEl = $("tabbar");
const workspaces = new Map();
let wsOrderIds = [];
let anchorWs = null;
let viewedWs = null;
let viewedTab = null;

// 发一条 TabOp 控制帧到指定窗口(externally-tagged:{"TabOp":{"workspace_id":W,"op":<op>}};
// op:New="New" / Select={Select:{idx}} / Close={Close:{tab_id}})。wsId 空则忽略。
function sendTabOp(wsId, op) {
  if (wsId === null || wsId === undefined) return;
  sendControl({ TabOp: { workspace_id: wsId, op } });
}

// 有明细(Map 里有 tabs)的窗口 id,按 wsOrderIds 顺序;列表里没有的 Map 键(理论上不出现)追加。
function orderedWsIds() {
  const ids = [];
  for (const id of wsOrderIds) if (workspaces.has(id)) ids.push(id);
  for (const id of workspaces.keys()) if (!wsOrderIds.includes(id)) ids.push(id);
  return ids;
}

function renderTabBar() {
  const order = orderedWsIds();
  let total = 0;
  for (const id of order) total += ((workspaces.get(id) || {}).tabs || []).length;
  if (!order.length || total === 0) { tabbarEl.classList.add("hidden"); tabbarEl.replaceChildren(); return; }
  tabbarEl.classList.remove("hidden");
  const multi = order.length > 1;   // 单窗口不画窗口标签/分隔 → 视觉≈原单栏
  const frag = document.createDocumentFragment();
  order.forEach((wsId, segIdx) => {
    const w = workspaces.get(wsId) || { tabs: [], active: -1 };
    const tabs = w.tabs || [];
    const seg = document.createElement("div");
    seg.className = "seg";
    if (multi) {
      if (segIdx > 0) { const div = document.createElement("span"); div.className = "segdiv"; seg.appendChild(div); }
      const hdr = document.createElement("span");
      hdr.className = "seghdr" + (wsId === anchorWs ? " anchor" : "");
      hdr.textContent = "窗口 " + (segIdx + 1);
      if (wsId === anchorWs) hdr.title = "共享锚窗口(新建 tab 落这里)";
      seg.appendChild(hdr);
    }
    tabs.forEach((t, i) => {
      const el = document.createElement("div");
      el.className = (wsId === viewedWs && t.tab_id === viewedTab) ? "tab viewed" : "tab";
      if (i === w.active) {                 // 该窗口桌面焦点标记(琥珀点)
        const dot = document.createElement("span");
        dot.className = "focusdot";
        dot.title = "桌面焦点";
        el.appendChild(dot);
      }
      const label = document.createElement("span");
      label.className = "label";
      label.textContent = t.title && t.title.length ? t.title : "tab " + (i + 1);
      el.appendChild(label);
      // × 只在该窗口 ≥2 tab 时出现:防误触关掉窗口最后一个 tab(= 关整个桌面 quill,后端诚实继承)。
      if (tabs.length > 1) {
        const x = document.createElement("span");
        x.className = "close";
        x.textContent = "×";
        // click(非 pointerup):浏览器在滚动手势后抑制 click → 横滑标签栏不会误触 ×。
        x.addEventListener("click", (e) => {
          e.stopPropagation();
          sendTabOp(wsId, { Close: { tab_id: t.tab_id } });
        });
        el.appendChild(x);
      }
      el.addEventListener("click", () => {
        if (!(wsId === viewedWs && t.tab_id === viewedTab)) sendTabOp(wsId, { Select: { idx: i } });
      });
      seg.appendChild(el);
    });
    frag.appendChild(seg);
  });
  // + 新建 → 锚窗口(New 后端已落锚,与传的 workspace_id 无关;传 anchorWs 语义清晰)。
  const plus = document.createElement("div");
  plus.className = "newtab";
  plus.textContent = "+";
  plus.setAttribute("aria-label", "新建 tab(落共享锚窗口)");
  plus.addEventListener("click", () => {
    const target = anchorWs !== null ? anchorWs : (viewedWs !== null ? viewedWs : (order[0] ?? null));
    sendTabOp(target, "New");
  });
  frag.appendChild(plus);
  tabbarEl.replaceChildren(frag);
}

// 收到某窗口 WorkspaceInfo → 更新该窗口的 tab 列表 + 桌面焦点下标 + 重画分段栏。
function updateWorkspace(info) {
  if (!info || typeof info.workspace_id !== "number") return;
  const tabs = Array.isArray(info.tabs) ? info.tabs.slice() : [];
  const active = Number.isInteger(info.active) ? info.active : -1;
  workspaces.set(info.workspace_id, { tabs, active });
  renderTabBar();
}

// 收到聚合 Workspaces 列表 → 学窗口顺序 + 锚(home)+ 剪除已消失窗口(feeder 断开)的段。
function updateWorkspacesList(list) {
  const metas = Array.isArray(list && list.workspaces) ? list.workspaces : [];
  wsOrderIds = metas.map((m) => m.id);
  if (typeof list.active === "number") anchorWs = list.active;
  const present = new Set(wsOrderIds);
  for (const id of Array.from(workspaces.keys())) if (!present.has(id)) workspaces.delete(id);
  renderTabBar();
}

// 收到 StreamFocus{ws,tab} = 后端确认"此后字节流属于 (ws,tab)"(连上 / Select 确认 / 跟随焦点)。
// 切到该 (ws,tab) 的实例(看过的瞬时显示上次状态,没看过的新建=从 kernel 重放重建),标记
// pendingReset(随后到达的重放帧一次 reset+write 更新到当前 → 无空白闪),刷新高亮/标题。
function onStreamFocus(ws, tab) {
  viewedWs = ws;                         // 先设(showInstance/淘汰须保住当前 viewed)
  viewedTab = tab;
  const inst = showInstance(ws, tab);
  inst.pendingReset = true;              // 关键帧重放紧随其后 → 应用前先 reset(见 onmessage)
  const w = workspaces.get(ws);
  const meta = w && w.tabs.find((t) => t.tab_id === tab);
  if (meta) titleEl.textContent = meta.title && meta.title.length ? meta.title : "quill";
  renderTabBar();
  scheduleReflowRender();
}

// 入站控制帧:externally-tagged ServerMsg。驱动分段标签栏 / viewed (ws,tab) / holder。
function handleServerControl(text) {
  let msg;
  try { msg = JSON.parse(text); } catch (_) { return; }
  if (msg.StreamFocus) {
    activeWorkspaceId = msg.StreamFocus.workspace_id;   // 本 holder = 在看的 workspace
    onStreamFocus(msg.StreamFocus.workspace_id, msg.StreamFocus.tab_id);
  } else if (msg.Workspaces) {
    // 先于 StreamFocus 到 → 让 holdOnce 能尽早 fire(取锚 ws;StreamFocus 到后改为在看的 ws)。
    if (activeWorkspaceId === null && typeof msg.Workspaces.active === "number") {
      activeWorkspaceId = msg.Workspaces.active;
    }
    updateWorkspacesList(msg.Workspaces);
  } else if (msg.Workspace) {
    updateWorkspace(msg.Workspace);
  } else if (msg.TabAdded) {
    // 后端 Fed 用整份 Workspace 广播(非增量),这里防御性并入该窗口(随后 Workspace 覆盖为权威)。
    const w = workspaces.get(msg.TabAdded.workspace_id);
    if (w && msg.TabAdded.tab && !w.tabs.some((t) => t.tab_id === msg.TabAdded.tab.tab_id)) {
      w.tabs.push(msg.TabAdded.tab); renderTabBar();
    }
  } else if (msg.TabRemoved) {
    const w = workspaces.get(msg.TabRemoved.workspace_id);
    if (w) { w.tabs = w.tabs.filter((t) => t.tab_id !== msg.TabRemoved.tab_id); renderTabBar(); }
  } else if (msg.Dims) {
    applyDims(msg.Dims.cols, msg.Dims.rows);  // A′ 增量1:按桌面宽渲染
  }
  holdOnce();
}

// 同源:页面由 daemon 同口 serve,WS 直接连同 host:port。file:// 兜底到 10.0.0.2。
function wsUrl() {
  if (location.host) {
    const scheme = location.protocol === "https:" ? "wss:" : "ws:";
    return `${scheme}//${location.host}/`;
  }
  return "ws://10.0.0.2:7878/";
}

let ws = null;
let reconnectTimer = null;

function connect() {
  const url = wsUrl();
  setLive(false, `连接 ${url} …`);
  try {
    ws = new WebSocket(url);
  } catch (e) {
    setLive(false, `URL 非法:${e}`);
    scheduleReconnect();
    return;
  }
  // 关键:收二进制(原始字节)。默认是 'blob' 会异步化乱序,必须 arraybuffer。
  ws.binaryType = "arraybuffer";

  ws.onopen = () => {
    // 砖2 W2:不再在此无条件 reset。重连后保暖实例仍在(手机后台/锁屏/弱网是高频路径),
    // viewedTab 归 null → 首个 StreamFocus 会 showInstance + pendingReset,由随后重放帧一次
    // reset+write 重建当前屏(旧的"reset 防重复"语义移到 pendingReset,且切回不空屏)。
    held = false; // 新连接 → 等学到 workspace id 后重新 Hold
    viewedWs = null; viewedTab = null; // 新连接 → 首个 StreamFocus 视作初始 viewed
    scheduleReflowRender();
    setLive(true, "已连接(直播)");
  };
  ws.onmessage = (ev) => {
    // 控制面 Text 帧(JSON ServerMsg)与数据面 Binary 帧(PTY 字节)分流(T6 块C)。
    if (typeof ev.data === "string") { handleServerControl(ev.data); return; }
    if (!term) return;                       // 首个 StreamFocus 前无实例(理论上字节不先到)
    // pendingReset:切到该 tab 后的首个字节 = 关键帧重放 → 先 reset 再 write,同一 handler /
    // 同一次绘制内完成 → 保暖切换从"上次状态"直接刷成"当前",无中间空屏闪。
    if (curInst && curInst.pendingReset) { try { term.reset(); } catch (_) {} curInst.pendingReset = false; }
    term.write(new Uint8Array(ev.data));     // xterm 本地模拟 VT + 本地 reflow
  };
  ws.onclose = () => { setLive(false, "连接已断,重连中…"); scheduleReconnect(); };
  ws.onerror = () => { setLive(false, "连接错误(daemon 在跑?VPN 通?)"); };
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    connect();
  }, RECONNECT_MS);
}

// OSC 标题(xterm 解析 \x1b]0;…\x07)→ 顶栏标题:砖2 W2 移到 makeTermInstance 逐实例注册
// (只更新当前 active 实例的标题;切 tab 时 onStreamFocus 用后端 tab 标题即时刷新)。

// ── 真 X 关闭 vs 断线(T6 块C, ADR-0015 R1)──────────────────────────────────────
// "真 X" = 用户关 tab / 导航离开(pagehide 且非 bfcache 持久态)→ 发 **Release**(显式
// 释放本 holder;daemon explicit 释放,anchor 在则只关这个 view 不销毁会话)。
// **后台 / 锁屏 / 网络抖 = 断线 = 非事件**:故意不在 visibilitychange 上发任何东西 ——
// 连接保持或自然断开,daemon 按断线语义只动 holder,anchor 在故工作区不死、回来自动重连重放。
// (浏览器关 tab 时还会自动发 WS Close 帧,daemon 同样按显式关闭处理,Release 是双保险。)
window.addEventListener("pagehide", (e) => {
  if (e.persisted) return; // 进 bfcache(页面可能复活)→ 视作后台,不发 Release
  if (activeWorkspaceId !== null) sendControl({ Release: { workspace_id: activeWorkspaceId } });
});

connect();

// ── 砖2 W3:注册 Service Worker(缓存 app shell,弱网 / 后台回来首屏快)────────────────
// 从根 `/sw.js` 注册 → scope 覆盖整站(daemon 单起一条 `/sw.js` 路由 serve 它)。SW 只
// cache-first 静态壳(index.html + vendored xterm),WS 数据面 / 动态请求照常走网络 → 忠实
// 镜像保底不受影响。**渐进增强**:不支持 / 注册失败(如经 http://<VPN IP> 非 secure context
// → serviceWorker 不可用)都静默跳过,行为等价今天。load 后注册,不与首屏资源加载抢带宽。
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
